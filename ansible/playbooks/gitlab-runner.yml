---
- name: Install GitLab Runner
  hosts: gitlab_runner
  become: true

  pre_tasks:
    - name: Prepare host
      ansible.builtin.import_tasks: tasks/common.yml

  tasks:
    - name: Download official GitLab Runner repository setup script
      ansible.builtin.get_url:
        url: https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh
        dest: /usr/local/src/gitlab-runner-repository.sh
        mode: "0755"

    - name: Configure official GitLab Runner APT repository
      ansible.builtin.command: /usr/local/src/gitlab-runner-repository.sh
      args:
        creates: /etc/apt/sources.list.d/runner_gitlab-runner.list

    - name: Install GitLab Runner native package
      ansible.builtin.apt:
        name: gitlab-runner
        state: present
        update_cache: true

    - name: Check whether GitLab Runner is registered
      ansible.builtin.command: grep -q '^\[\[runners\]\]' /etc/gitlab-runner/config.toml
      register: gitlab_runner_registered
      changed_when: false
      failed_when: false

    - name: Register GitLab Runner with shell executor
      ansible.builtin.command:
        argv:
          - gitlab-runner
          - register
          - --non-interactive
          - --url
          - "{{ gitlab_runner_url }}"
          - --token
          - "{{ gitlab_runner_token }}"
          - --executor
          - shell
          - --description
          - aura-shell-runner
      when:
        - gitlab_runner_token | length > 0
        - gitlab_runner_registered.rc != 0
      changed_when: true
      no_log: true
      notify: Restart GitLab Runner

    - name: Enable and start GitLab Runner
      ansible.builtin.systemd_service:
        name: gitlab-runner
        enabled: true
        state: started

  handlers:
    - name: Restart GitLab Runner
      ansible.builtin.systemd_service:
        name: gitlab-runner
        state: restarted
